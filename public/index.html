<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lean Ninja 5S Quiz | Gideon USA</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --orange:#E8651A;
  --dark:#111;
  --card:#1e1e1e;
  --card2:#2a2a2a;
  --gold:#FFD700;
  --green:#2ecc71;
  --red:#e74c3c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* LOGO BAR */
.logo-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:10px 20px;background:rgba(17,17,17,.95);backdrop-filter:blur(8px);border-bottom:1px solid #1e1e1e}
.logo-bar img{height:48px;object-fit:contain}
.logo-fallback{font-size:20px;font-weight:900;letter-spacing:3px;color:var(--orange)}
.logo-sub{font-size:10px;letter-spacing:2px;color:#555;text-align:center}

/* SCREENS */
.screen{display:none;width:100%;max-width:860px;padding:82px 20px 40px;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* SPLASH */
#splash{text-align:center}
#splash h1{font-size:clamp(42px,10vw,86px);color:var(--orange);line-height:1.05;margin-bottom:6px}
#splash .tag{font-size:16px;color:#666;letter-spacing:1px;margin-bottom:36px}
.name-box{background:var(--card);border-radius:16px;padding:26px 28px;width:100%;max-width:460px;margin-bottom:16px}
.name-box h3{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:12px}
.name-box input{width:100%;padding:14px 18px;font-size:18px;border-radius:10px;border:2px solid #2a2a2a;background:#111;color:white;text-align:center;outline:none;margin-bottom:14px;transition:border-color .2s}
.name-box input:focus{border-color:var(--orange)}
.conn-line{font-size:12px;color:#555;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#888}
.dot.ok{background:#2ecc71}
.dot.err{background:#e74c3c}
.host-link{font-size:13px;color:#555;cursor:pointer;text-decoration:underline;margin-top:4px}
.host-link:hover{color:#aaa}

/* BUTTONS */
.btn{border:none;border-radius:50px;cursor:pointer;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:transform .12s,filter .12s}
.btn:hover{transform:scale(1.04);filter:brightness(1.1)}
.btn-primary{background:var(--orange);color:white;padding:15px 50px;font-size:17px;width:100%}
.btn-sm{background:var(--card2);color:#888;padding:9px 22px;font-size:12px;border-radius:30px;border:1px solid #333;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.btn-sm:hover{color:white;border-color:#555}

/* QUIZ */
#quiz{padding-top:82px}
.prog-wrap{width:100%;background:rgba(255,255,255,.07);border-radius:4px;height:5px;margin-bottom:18px}
.prog-fill{height:5px;border-radius:4px;background:var(--orange);transition:width .4s}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;width:100%;margin-bottom:14px}
.q-meta .q-num{font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase}
.q-meta .q-who{font-size:13px;color:#777;margin-top:3px}
.score-pill{background:var(--card2);padding:7px 18px;border-radius:20px;font-size:15px;font-weight:700;color:var(--gold)}

/* TIMER */
.timer-wrap{position:relative;width:66px;height:66px;margin:0 auto 14px}
.timer-wrap svg{transform:rotate(-90deg)}
.t-track{fill:none;stroke:rgba(255,255,255,.07);stroke-width:6}
.t-arc{fill:none;stroke:var(--orange);stroke-width:6;stroke-linecap:round;stroke-dasharray:183;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .3s}
.t-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:700;color:var(--orange)}

.q-text{background:var(--card);border-radius:14px;padding:26px 28px;font-size:clamp(16px,2.8vw,22px);font-weight:700;text-align:center;line-height:1.4;width:100%;margin-bottom:18px;border:1px solid rgba(255,255,255,.04)}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.ans-btn{padding:17px 14px;border:none;border-radius:12px;font-size:clamp(13px,2vw,17px);font-weight:700;cursor:pointer;color:white;text-align:left;display:flex;align-items:center;gap:11px;line-height:1.3;transition:transform .1s,filter .2s}
.ans-btn:hover:not(:disabled){transform:scale(1.025);filter:brightness(1.15)}
.ans-btn:disabled{cursor:default}
.ans-btn .ico{width:30px;height:30px;min-width:30px;border-radius:50%;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:13px}
.ans-btn:nth-child(1){background:#c0392b}
.ans-btn:nth-child(2){background:#2471a3}
.ans-btn:nth-child(3){background:#1e8449}
.ans-btn:nth-child(4){background:#76448a}
.ans-btn.correct{outline:4px solid var(--gold);animation:pop .4s}
.ans-btn.wrong{filter:brightness(.3)!important;transform:none!important}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}

.fact{display:none;background:#0d2235;border-left:5px solid var(--orange);border-radius:10px;padding:14px 18px;font-size:14px;color:#bbb;line-height:1.7;width:100%;margin-top:12px}
.fact strong{color:var(--gold)}
.fb{text-align:center;margin-top:10px;min-height:34px;font-size:19px;font-weight:700}
.fb.ok{color:var(--gold)}
.fb.bad{color:var(--red)}
.next-btn{display:none;margin:14px auto 0;background:white;color:var(--dark);padding:12px 36px;font-size:14px;font-weight:700;border:none;border-radius:50px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.next-btn:hover{background:#eee}

/* DONE */
#done{text-align:center}
#done h2{font-size:30px;color:var(--orange);margin-bottom:8px}
.score-big{font-size:90px;font-weight:900;color:white;line-height:1}
.score-label{font-size:14px;color:#555;margin-bottom:12px}
.rank-chip{display:inline-block;padding:8px 24px;border-radius:30px;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.r-master{background:var(--gold);color:#111}
.r-ninja{background:#2ecc71;color:#111}
.r-apprentice{background:#3498db;color:white}
.r-beginner{background:var(--red);color:white}
.done-msg{font-size:14px;color:#555;margin-bottom:8px}
.done-actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;justify-content:center}

/* LEADERBOARD */
#leaderboard{padding-top:82px;text-align:center}
#leaderboard h2{font-size:clamp(26px,6vw,50px);color:var(--orange);margin-bottom:4px}
.lb-sub{font-size:14px;color:#555;margin-bottom:6px}
.lb-count{font-size:13px;color:#444;margin-bottom:20px}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:#c0392b;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.blink{width:8px;height:8px;background:white;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.lb-list{width:100%;max-width:620px}
.lb-row{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:12px;padding:13px 18px;margin-bottom:9px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
.lb-row:nth-child(1){background:linear-gradient(135deg,#2e2200,#1e1e1e);border:1px solid var(--gold)}
.lb-row:nth-child(2){background:linear-gradient(135deg,#1a1a1a,#1e1e1e);border:1px solid #888}
.lb-row:nth-child(3){background:linear-gradient(135deg,#1e1000,#1e1e1e);border:1px solid #cd7f32}
.lb-medal{font-size:22px;min-width:36px;text-align:center}
.lb-name{flex:1;font-size:17px;font-weight:700;text-align:left}
.lb-score{font-size:21px;font-weight:900;color:var(--gold)}
.lb-tag{font-size:10px;padding:3px 9px;border-radius:10px;white-space:nowrap}
.lb-empty{text-align:center;color:#444;font-size:15px;padding:50px 20px}
.host-btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center}

@media(max-width:520px){
  .answers{grid-template-columns:1fr}
  .name-box{padding:20px 16px}
}
</style>
</head>
<body>

<!-- LOGO -->
<div class="logo-bar">
  <div style="display:flex;flex-direction:column;align-items:center">
    <img src="gideon_logo.png" alt="Gideon USA"
      onerror="this.style.display='none';document.getElementById('lf').style.display='block'">
    <div id="lf" style="display:none">
      <div class="logo-fallback">GIDEON USA</div>
      <div class="logo-sub">LEAN NINJA CHALLENGE</div>
    </div>
  </div>
</div>

<!-- SPLASH -->
<div class="screen active" id="splash">
  <h1>LEAN NINJA<br>CHALLENGE</h1>
  <div class="tag">5S Knowledge Quiz &nbsp;·&nbsp; Gideon Edition</div>

  <div class="name-box">
    <h3>Enter Your Name to Play</h3>
    <input type="text" id="playerName" placeholder="First name or nickname" maxlength="24"
      onkeydown="if(event.key==='Enter')beginQuiz()">
    <button class="btn btn-primary" onclick="beginQuiz()">Join &amp; Play ▶</button>
  </div>

  <div class="conn-line">
    <span class="dot" id="connDot"></span>
    <span id="connTxt">Connecting...</span>
  </div>
  <div class="host-link" onclick="openLeaderboard()">📊 Open Host Leaderboard</div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="q-header">
    <div class="q-meta">
      <div class="q-num" id="qNum">Question 1 of 15</div>
      <div class="q-who" id="qWho"></div>
    </div>
    <div class="score-pill">⭐ <span id="scoreDisp">0</span></div>
  </div>

  <div class="timer-wrap">
    <svg viewBox="0 0 66 66" width="66" height="66">
      <circle class="t-track" cx="33" cy="33" r="29"/>
      <circle class="t-arc" id="tArc" cx="33" cy="33" r="29"/>
    </svg>
    <div class="t-num" id="tNum">20</div>
  </div>

  <div class="q-text" id="qText"></div>
  <div class="answers" id="answersGrid"></div>
  <div class="fact" id="factCard"></div>
  <div class="fb" id="fb"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQ()">Next ▶</button>
</div>

<!-- DONE -->
<div class="screen" id="done">
  <h2>🥷 Quiz Complete!</h2>
  <div class="score-big" id="doneScore">0</div>
  <div class="score-label">points</div>
  <div class="rank-chip" id="doneRank"></div>
  <div class="done-msg" id="doneMsg"></div>

  <!-- mini live leaderboard -->
  <div class="lb-list" id="miniLB" style="max-width:540px"></div>

  <div class="done-actions">
    <button class="btn btn-primary" style="width:auto;padding:13px 36px" onclick="openLeaderboard()">📊 Full Leaderboard</button>
    <button class="btn-sm" onclick="restart()">↩ Play Again</button>
  </div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="leaderboard">
  <div class="live-pill"><span class="blink"></span> LIVE</div>
  <h2>🥷 LEAN NINJA RANKINGS</h2>
  <div class="lb-sub">Gideon USA &nbsp;·&nbsp; 5S Performance Challenge</div>
  <div class="lb-count" id="lbCount"></div>
  <div class="lb-list" id="lbList"><div class="lb-empty">Waiting for players...</div></div>
  <div class="host-btns">
    <button class="btn-sm" onclick="clearAll()">🗑 Clear All Scores</button>
    <button class="btn-sm" onclick="showScreen('splash')">← Back</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// QUESTIONS
// ─────────────────────────────────────────────
const QS = [
  {q:"What is the correct order of the 5S methodology?",
   a:["Sort, Set in Order, Shine, Standardize, Sustain","Standardize, Sort, Shine, Set in Order, Sustain","Sustain, Sort, Standardize, Shine, Set in Order","Sort, Shine, Set in Order, Sustain, Standardize"],
   c:0,f:"<strong>5S in order:</strong> Sort → Set in Order → Shine → Standardize → Sustain. Each S builds on the last — you cannot standardize chaos."},
  {q:"In the Autobahn 5S Performance Challenge, what was the goal in every single round?",
   a:["Find the hidden number on each page","Cross out numbers 1–49 in order","Sort numbers from largest to smallest","Complete a timed color-coding exercise"],
   c:1,f:"Same task, different workspace conditions. <strong>The work didn't change — the system did.</strong> The system determined the speed."},
  {q:"Which company developed the Toyota Production System that gave birth to 5S?",
   a:["Ford Motor Company","General Electric","Toyota Motor Corporation","Boeing"],
   c:2,f:"<strong>Taiichi Ohno</strong> at Toyota developed 5S after WWII when limited resources forced radical efficiency. It became the foundation of modern Lean management worldwide."},
  {q:"What does the Autobahn standard say about work that is OFF standard?",
   a:["Improve it","Document it","REJECT it","Escalate it"],
   c:2,f:"<strong>ON STANDARD = ACCEPT &nbsp;|&nbsp; OFF STANDARD = REJECT.</strong> No gray area. Standards only work when enforced consistently — every time."},
  {q:"What was the key insight from Round 2 — Sort?",
   a:["The numbers were fully standardized","Removing what isn't needed helps — but is that enough?","Color-coding solves everything","Time limits don't matter"],
   c:1,f:"<strong>Sorting</strong> removes waste and clutter — but it's only the first S. A sorted mess is still a mess if nothing has a designated place."},
  {q:"What did Round 3 — Set in Order — demonstrate?",
   a:["Rotation schedules improve accuracy","Color matters more than position","Grouping improves flow — but standard placement drives speed","Sustaining gains requires daily audits"],
   c:2,f:"<strong>Set in Order</strong> assigns a specific, logical home to every item so anyone can find it — and return it — without thinking."},
  {q:"What did Round 5 — Standardized System — prove?",
   a:["Standardization creates speed","More time always produces better results","Individual talent beats team systems","Complexity is unavoidable"],
   c:0,f:"Time dropped to <strong>20 seconds</strong> and teams finished. <strong>Standardization is a multiplier</strong> — it turns individual capability into repeatable team performance."},
  {q:"What did Round 7 reveal about visual clarity?",
   a:["It adds more steps to the process","When systems are clear, problems become visible instantly","Visual tools only help experienced workers","Standardization hides variation"],
   c:1,f:"Round 7 gave only <strong>5 seconds</strong> to spot missing numbers — and teams could do it. A clear system makes abnormalities <strong>immediately obvious.</strong>"},
  {q:"What is the Autobahn Way motto?",
   a:["Measure Twice, Cut Once","Eliminate Waste, Accelerate Growth","Clear Road. Full Throttle.","Sort First. Sustain Always."],
   c:2,f:"<strong>Clear Road. Full Throttle.</strong> 5S clears the road — removes clutter, establishes standards, builds visual clarity. Then the team executes at maximum speed."},
  {q:"What does 'Shine' (the 3rd S) primarily mean in a workplace?",
   a:["Polish your presentation skills","Add color coding to documents","Keep the workplace clean — and inspect it in the process","Recognize top performers"],
   c:2,f:"<strong>Shine (Seiso)</strong> means cleaning — but cleaning IS inspecting. When you clean, you notice what's broken, missing, or misplaced. It's a built-in quality check."},
  {q:"Toyota Motor Corporation was founded in what year?",
   a:["1929","1937","1945","1952"],
   c:1,f:"<strong>1937.</strong> Kiichiro Toyoda founded Toyota. The post-WWII resource crisis forced the efficiency innovations that became the Toyota Production System and 5S."},
  {q:"What is 'Standardize' (the 4th S) designed to do?",
   a:["Create checklists for managers only","Lock in the gains from the first three S's with documented procedures","Replace Sort and Set in Order after 90 days","Set annual performance benchmarks"],
   c:1,f:"<strong>Standardize</strong> captures what Sort, Set in Order, and Shine created — and turns it into documented, visual, repeatable procedures so improvements stick."},
  {q:"Why is 'Sustain' considered the hardest of the 5 S's?",
   a:["Shine is actually harder","Sort — people resist throwing things away","Sustain — maintaining discipline over time requires real culture change","Set in Order — redesigning layouts is expensive"],
   c:2,f:"<strong>Sustain (Shitsuke)</strong> is about discipline and habit. Most 5S efforts fail here. It requires ongoing leadership commitment — not a one-time cleanup event."},
  {q:"The 5S debrief listed 5 insights in order. Which sequence is correct?",
   a:["Sorting helps → Clutter slows → Standardize → Structure → Visual clarity","Clutter slows → Sorting helps → Structure accelerates → Standardization maximizes speed → Visual clarity exposes problems","Visual clarity → Standardization → Sort → Structure → Clutter","Standardization → Sort → Structure → Visual → Clutter slows"],
   c:1,f:"The debrief mirrored the rounds exactly. Each round added one 5S layer and the team felt the difference in real time. <strong>You didn't just learn it — you felt it.</strong>"},
  {q:"For Gideon's team starting 5S — what is the BEST first step in any area?",
   a:["Buy new storage and label everything","Hire a consultant to design the layout","Walk the space and remove anything not needed for current work — Sort first","Write a standardization manual before touching anything"],
   c:2,f:"<strong>Always Sort first.</strong> You cannot Set in Order what you haven't sorted. Buying equipment or writing standards before sorting just organizes the clutter — it doesn't eliminate it."}
];

// ─────────────────────────────────────────────
// SOCKET
// ─────────────────────────────────────────────
const socket = io();
let playerName = '';
let qIdx = 0;
let score = 0;
let timerInterval = null;
let timeLeft = 0;
let answered = false;
const MAX_TIME = 20;
const MAX_PTS = 100;
const TOTAL_MAX = QS.length * MAX_PTS;

socket.on('connect', () => setConn(true));
socket.on('disconnect', () => setConn(false));
socket.on('leaderboard', data => renderLB('lbList', data));
socket.on('leaderboard', data => renderLB('miniLB', data, 5));

function setConn(ok) {
  document.getElementById('connDot').className = 'dot ' + (ok ? 'ok' : 'err');
  document.getElementById('connTxt').textContent = ok ? '● Live — leaderboard syncs in real time' : '○ Reconnecting...';
}

// ─────────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function openLeaderboard() {
  showScreen('leaderboard');
}

// ─────────────────────────────────────────────
// QUIZ
// ─────────────────────────────────────────────
function beginQuiz() {
  const n = document.getElementById('playerName').value.trim();
  if (!n) {
    const inp = document.getElementById('playerName');
    inp.style.borderColor = '#e74c3c'; inp.focus();
    setTimeout(() => inp.style.borderColor = '#2a2a2a', 1200);
    return;
  }
  playerName = n; qIdx = 0; score = 0;
  document.getElementById('scoreDisp').textContent = '0';
  document.getElementById('qWho').textContent = '🥷 ' + playerName;
  showScreen('quiz');
  loadQ();
}

function loadQ() {
  answered = false;
  const q = QS[qIdx];
  document.getElementById('qNum').textContent = `Question ${qIdx+1} of ${QS.length}`;
  document.getElementById('progFill').style.width = `${(qIdx/QS.length)*100}%`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('fb').textContent = '';
  document.getElementById('fb').className = 'fb';
  document.getElementById('factCard').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  ['▲','◆','●','■'].forEach((ico, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = `<span class="ico">${ico}</span>${q.a[i]}`;
    btn.onclick = () => pick(i);
    grid.appendChild(btn);
  });
  startTimer();
}

function startTimer() {
  timeLeft = MAX_TIME; tick();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--; tick();
    if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) timeUp(); }
  }, 1000);
}

function tick() {
  const pct = timeLeft / MAX_TIME;
  const arc = document.getElementById('tArc');
  arc.style.strokeDashoffset = 183 * (1 - pct);
  arc.style.stroke = pct > .5 ? 'var(--orange)' : pct > .25 ? '#e67e22' : '#e74c3c';
  document.getElementById('tNum').textContent = timeLeft;
}

function pick(idx) {
  if (answered) return;
  answered = true; clearInterval(timerInterval);
  const q = QS[qIdx];
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (idx === q.c) {
    const pts = Math.max(10, Math.round(MAX_PTS * timeLeft / MAX_TIME));
    score += pts;
    document.getElementById('scoreDisp').textContent = score;
    btns[idx].classList.add('correct');
    fb.textContent = `+${pts} pts — Correct!`; fb.className = 'fb ok';
  } else {
    btns[idx].classList.add('wrong'); btns[q.c].classList.add('correct');
    fb.textContent = 'Not quite — see the answer above.'; fb.className = 'fb bad';
  }
  document.getElementById('factCard').innerHTML = q.f;
  document.getElementById('factCard').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';
}

function timeUp() {
  answered = true;
  const q = QS[qIdx];
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach(b => b.disabled = true); btns[q.c].classList.add('correct');
  const fb = document.getElementById('fb');
  fb.textContent = "Time's up!"; fb.className = 'fb bad';
  document.getElementById('factCard').innerHTML = q.f;
  document.getElementById('factCard').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() {
  qIdx++;
  if (qIdx >= QS.length) finish();
  else loadQ();
}

// ─────────────────────────────────────────────
// FINISH
// ─────────────────────────────────────────────
function rankFor(s) {
  const p = s / TOTAL_MAX;
  if (p >= .9)  return {label:'🥷 Lean Master — Black Belt', cls:'r-master'};
  if (p >= .75) return {label:'⚡ Lean Ninja — Green Belt',   cls:'r-ninja'};
  if (p >= .55) return {label:'📋 Lean Apprentice',            cls:'r-apprentice'};
  return            {label:'🔧 Keep Sorting!',                cls:'r-beginner'};
}

function finish() {
  const r = rankFor(score);
  document.getElementById('doneScore').textContent = score;
  const rc = document.getElementById('doneRank');
  rc.textContent = r.label; rc.className = 'rank-chip ' + r.cls;
  document.getElementById('doneMsg').textContent = '✅ Score submitted to the leaderboard!';
  socket.emit('submit_score', { name: playerName, score });
  showScreen('done');
}

// ─────────────────────────────────────────────
// LEADERBOARD
// ─────────────────────────────────────────────
function renderLB(id, rows, limit) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!rows || !rows.length) {
    el.innerHTML = '<div class="lb-empty">No scores yet — waiting for players...</div>';
    if (id === 'lbList') document.getElementById('lbCount').textContent = '';
    return;
  }
  if (id === 'lbList') {
    document.getElementById('lbCount').textContent = `${rows.length} player${rows.length !== 1 ? 's' : ''} on the board`;
  }
  const medals = ['🥇','🥈','🥉'];
  const show = limit ? rows.slice(0, limit) : rows.slice(0, 20);
  el.innerHTML = show.map((r, i) => {
    const rank = rankFor(r.score);
    return `<div class="lb-row">
      <div class="lb-medal">${medals[i] || '#'+(i+1)}</div>
      <div class="lb-name">${esc(r.name)}</div>
      <div class="lb-score">${r.score}</div>
      <div class="lb-tag rank-chip ${rank.cls}" style="font-size:10px;padding:2px 8px">${rank.label.replace(/^[^\s]+\s/,'')}</div>
    </div>`;
  }).join('');
}

function clearAll() {
  if (confirm('Clear ALL scores from the leaderboard?')) socket.emit('clear_scores');
}

function restart() {
  qIdx = 0; score = 0;
  document.getElementById('scoreDisp').textContent = '0';
  showScreen('splash');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
